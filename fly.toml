# Fly.io config — optional API hosting (fly launch --dockerfile apps/api/Dockerfile)
app = "download-everything-api"
primary_region = "iad"

[build]
  dockerfile = "apps/api/Dockerfile"

[env]
  CORS_ORIGINS = "https://download-everything.pages.dev"
  MAX_ANALYZE_TIMEOUT = "90"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    grace_period = "30s"
    interval = "30s"
    method = "GET"
    path = "/health"
    timeout = "10s"
