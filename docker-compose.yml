services:
  api:
    build: ./apps/api
    ports:
      - "8000:8000"
    environment:
      - CORS_ORIGINS=http://localhost:4321,http://127.0.0.1:4321
    restart: unless-stopped

  web:
    image: node:22-alpine
    working_dir: /app
    volumes:
      - ./apps/web:/app
    ports:
      - "4321:4321"
    environment:
      - PUBLIC_API_URL=http://localhost:8000
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    depends_on:
      - api
